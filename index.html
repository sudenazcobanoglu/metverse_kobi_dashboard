
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetVerse | KOBİ Risk Yönetim Köprüsü</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'met-bg': 'rgb(4, 0, 29)',
              'met-card': 'rgb(30, 0, 34)',
              'met-accent': 'rgb(232, 133, 202)',
              'met-secondary': 'rgb(254, 255, 152)',
              'met-nav-hover-bg': 'rgb(255, 223, 152)',
              'met-nav-hover-text': 'rgb(10, 0, 61)',
              'met-active-line': 'rgb(250, 139, 255)',
              'met-white': '#fffffe',
              'met-gray': '#B0B0B0',
            },
            fontFamily: {
              sans: ['Plus Jakarta Sans', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
            },
            backgroundImage: {
              'glass-gradient': 'linear-gradient(135deg, rgba(30, 0, 34, 0.8) 0%, rgba(30, 0, 34, 0.4) 100%)',
              'glow-pink': 'radial-gradient(circle, rgba(232, 133, 202, 0.15) 0%, transparent 70%)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: rgb(4, 0, 29);
        color: #fffffe;
        overflow-x: hidden;
      }
      
      /* Noktalı Arka Plan Deseni (Dot Grid) */
      .dotted-background {
        background-image: radial-gradient(rgba(232, 133, 202, 0.15) 1px, transparent 1px);
        background-size: 30px 30px;
        animation: drift 120s linear infinite;
      }

      @keyframes drift {
        from { background-position: 0 0; }
        to { background-position: 1000px 1000px; }
      }

      .glass-card {
        background: rgba(30, 0, 34, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(232, 133, 202, 0.1);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .glass-card:hover {
        border: 1px solid rgba(250, 139, 255, 0.4);
        box-shadow: 0 0 20px rgba(250, 139, 255, 0.1);
        transform: translateY(-2px);
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgb(4, 0, 29);
      }
      ::-webkit-scrollbar-thumb {
        background: rgb(232, 133, 202, 0.3);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgb(250, 139, 255, 0.5);
      }
    </style>
<script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react": "https://esm.sh/react@^19.2.3",
    "react/": "https://esm.sh/react@^19.2.3/",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
